<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="styles.css">
</head>

<body style="padding:15px;">

<div id="toast"></div>

<h2>👤 My Profile</h2>

<input type="text" id="name" placeholder="Your Name"><br><br>

<input type="text" id="phone" disabled><br><br>

<textarea id="address" placeholder="Full Address"></textarea><br><br>

<input type="text" id="pincode" placeholder="Pincode"><br><br>

<label>🌙 Dark Mode</label>
<input type="checkbox" id="darkMode"><br><br>

<button onclick="saveProfile()">💾 Save Profile</button>

<script>

function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

// USER
let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
window.location.href="login.html";
}

// USERS DATA
let users = JSON.parse(localStorage.getItem("users")) || {};

// LOAD
function loadProfile(){

let p = users[currentUser] || {};

document.getElementById("name").value = p.name || "";
document.getElementById("address").value = p.address || "";
document.getElementById("pincode").value = p.pincode || "";
document.getElementById("phone").value = currentUser;

if(p.darkMode){
document.body.style.background="black";
document.body.style.color="white";
document.getElementById("darkMode").checked = true;
}

}

// SAVE
function saveProfile(){

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let pincode = document.getElementById("pincode").value;
let dark = document.getElementById("darkMode").checked;

if(name=="" || address=="" || pincode==""){
alert("Fill all fields");
return;
}

users[currentUser] = {
name,
address,
pincode,
phone: currentUser,
darkMode: dark
};

localStorage.setItem("users", JSON.stringify(users));

showToast("Saved ✅");

setTimeout(()=>{
window.location.href="index.html";
},1000);

}

loadProfile();

</script>

</body>
</html>
