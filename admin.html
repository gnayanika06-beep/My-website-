<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card" style="margin:20px;">
<h3>🔐 Admin Login</h3>
<input type="password" id="adminPass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none; padding:10px;">

<h2>⚙️ Admin Panel</h2>

<!-- ADD PRODUCT -->
<h3>➕ Add Product</h3>

<input type="text" id="name" placeholder="Product Name"><br><br>
<input type="number" id="price" placeholder="Price"><br><br>
<input type="text" id="image" placeholder="Image URL"><br><br>

<select id="category">
<option>Fashion</option>
<option>Beauty</option>
<option>Kids</option>
<option>Kitchen</option>
</select>

<br><br>

<button onclick="addProduct()">Add Product</button>

<!-- PRODUCT LIST -->
<h3>📦 Products</h3>
<div id="productList"></div>

<hr>

<!-- ORDERS -->
<h3>📦 Orders</h3>
<div id="orderList"></div>

</div>

<script>

/* LOGIN */
function login(){
let pass = document.getElementById("adminPass").value.trim();

if(pass == "1234"){
document.getElementById("loginBox").style.display = "none";
document.getElementById("adminPanel").style.display = "block";
showProducts();
renderOrders();
}else{
alert("Wrong Password");
}
}

/* PRODUCTS */
let products = JSON.parse(localStorage.getItem("products")) || [];

function showProducts(){

let list = document.getElementById("productList");
list.innerHTML = "";

products.forEach((p,i)=>{

list.innerHTML += `
<div class="card" style="display:flex; gap:10px; align-items:center;">

<img src="${p.image}" style="width:60px; height:60px; border-radius:8px;">

<div style="flex:1;">
<p>${p.name}</p>
<p>₹${p.price}</p>
<p style="font-size:12px; color:gray;">${p.category || "No category"}</p>
</div>

<button onclick="editProduct(${i})">✏️</button>
<button onclick="deleteProduct(${i})">❌</button>

</div>
`;

});

}

function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let image = document.getElementById("image").value;
let category = document.getElementById("category").value;

if(name=="" || price=="" || image==""){
alert("Fill all fields");
return;
}

products.push({name,price,image,category});

localStorage.setItem("products",JSON.stringify(products));

showProducts();

/* clear */
document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("image").value = "";

}

/* EDIT */
function editProduct(i){

let newName = prompt("Edit name", products[i].name);
let newPrice = prompt("Edit price", products[i].price);

if(newName && newPrice){
products[i].name = newName;
products[i].price = newPrice;

localStorage.setItem("products", JSON.stringify(products));
showProducts();
}

}

/* DELETE */
function deleteProduct(i){

if(confirm("Delete product?")){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}

}

/* ORDERS */
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function renderOrders(){

let container = document.getElementById("orderList");
container.innerHTML = "";

if(orders.length == 0){
container.innerHTML = "<p>No orders</p>";
return;
}

orders.forEach((o,index)=>{

let itemsHTML = "";
let total = 0;

o.items.forEach(item=>{
itemsHTML += `<p>${item.name} (x${item.quantity})</p>`;
total += item.price * item.quantity;
});

/* status color */
let color = "orange";
if(o.status == "Shipped") color = "blue";
if(o.status == "Delivered") color = "green";

container.innerHTML += `
<div class="card">

<h4>🧾 ${o.id}</h4>

<p>Status: <b style="color:${color}">${o.status}</b></p>

<p><b>Name:</b> ${o.name}</p>
<p><b>Address:</b> ${o.address}</p>

<hr>

${itemsHTML}

<p><b>Total:</b> ₹${total}</p>

<select onchange="changeStatus(${index}, this.value)">
<option ${o.status=="Pending"?"selected":""}>Pending</option>
<option ${o.status=="Shipped"?"selected":""}>Shipped</option>
<option ${o.status=="Delivered"?"selected":""}>Delivered</option>
</select>

<br><br>

<button onclick="deleteOrder(${index})">Delete</button>

</div>
`;

});

}

/* CHANGE STATUS */
function changeStatus(index, status){

orders[index].status = status;

localStorage.setItem("orders", JSON.stringify(orders));

renderOrders();

}

/* DELETE ORDER */
function deleteOrder(index){

if(confirm("Delete order?")){
orders.splice(index,1);
localStorage.setItem("orders", JSON.stringify(orders));
renderOrders();
}

}

</script>

</body>
</html>
