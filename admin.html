<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Login -->
<div id="loginBox">
<h3>Admin Login</h3>
<input type="password" id="adminPass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none;">

<h2>Admin Panel</h2>

<!-- Add Product -->
<h3>Add Product</h3>

<input type="text" id="name" placeholder="Product Name"><br><br>
<input type="number" id="price" placeholder="Price"><br><br>
<input type="text" id="image" placeholder="Image URL"><br><br>

<button onclick="addProduct()">Add Product</button>

<!-- Product List -->
<h3>Products</h3>
<div id="productList"></div>

<hr>

<!-- Orders -->
<h3>Orders</h3>
<div id="orderList"></div>

</div>

<script>

// LOGIN
function login(){
let pass = document.getElementById("adminPass").value.trim();

if(pass == "1234"){
document.getElementById("loginBox").style.display = "none";
document.getElementById("adminPanel").style.display = "block";
showProducts();
renderOrders();
}else{
alert("Wrong Password");
}
}

// PRODUCTS
let products = JSON.parse(localStorage.getItem("products")) || [];

function showProducts(){

let list = document.getElementById("productList");
list.innerHTML = "";

products.forEach((p,i)=>{

list.innerHTML += `
<div class="card">
${p.name} - ₹${p.price}
<button onclick="deleteProduct(${i})">Delete</button>
</div>
`;

});

}

function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let image = document.getElementById("image").value;

if(name=="" || price=="" || image==""){
alert("Fill all fields");
return;
}

products.push({name,price,image});

localStorage.setItem("products",JSON.stringify(products));

showProducts();

// clear input
document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("image").value = "";

}

function deleteProduct(i){

if(confirm("Delete product?")){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}

}

// ORDERS
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function renderOrders(){

let container = document.getElementById("orderList");
container.innerHTML = "";

if(orders.length == 0){
container.innerHTML = "<p>No orders</p>";
return;
}

orders.forEach((o,index)=>{

let itemsHTML = "";
let total = 0;

o.items.forEach(item=>{
itemsHTML += `<p>${item.name} (x${item.quantity})</p>`;
total += item.price * item.quantity;
});

container.innerHTML += `
<div class="card">

<h4>Order ID: ${o.id}</h4>
<p>Status: <b>${o.status}</b></p>
<p><b>Name:</b> ${o.name}</p>
<p><b>Address:</b> ${o.address}</p>

${itemsHTML}

<p><b>Total:</b> ₹${total}</p>

<select onchange="changeStatus(${index}, this.value)">
<option ${o.status=="Pending"?"selected":""}>Pending</option>
<option ${o.status=="Shipped"?"selected":""}>Shipped</option>
<option ${o.status=="Delivered"?"selected":""}>Delivered</option>
</select>

<br><br>

<button onclick="deleteOrder(${index})">Delete</button>

</div>
`;

});

}

// CHANGE STATUS
function changeStatus(index, status){

orders[index].status = status;

localStorage.setItem("orders", JSON.stringify(orders));

renderOrders();

}

// DELETE ORDER
function deleteOrder(index){

if(confirm("Delete order?")){
orders.splice(index,1);
localStorage.setItem("orders", JSON.stringify(orders));
renderOrders();
}

}

</script>

</body>
</html>
