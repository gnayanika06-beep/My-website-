<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="styles.css">

<style>
body{
font-family:Arial;
background:#f5f5f5;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:5px;
}

.add-btn{
background:green;
color:white;
width:100%;
}

.delete-btn{
background:red;
color:white;
}

.edit-btn{
background:orange;
color:white;
}

</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="card" style="margin:20px;">
<h3>🔐 Admin Login</h3>
<input type="password" id="adminPass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<!-- ⚙️ ADMIN PANEL -->
<div id="adminPanel" style="display:none; padding:10px;">

<h2>⚙️ Admin Panel</h2>

<!-- ➕ ADD PRODUCT -->
<h3>➕ Add Product</h3>

<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">
<input type="text" id="image" placeholder="Image URL">

<select id="category">
<option>Fashion</option>
<option>Beauty</option>
<option>Kids</option>
<option>Kitchen</option>
</select>

<button class="add-btn" onclick="addProduct()">Add Product</button>

<!-- 📦 PRODUCTS -->
<h3>📦 Products</h3>
<div id="productList"></div>

<hr>

<!-- 📦 ORDERS -->
<h3>📦 Orders</h3>
<div id="orderList"></div>

</div>

<script>

/* 🔐 AUTO LOGIN */
if(localStorage.getItem("adminLogin") === "true"){
document.getElementById("loginBox").style.display = "none";
document.getElementById("adminPanel").style.display = "block";
loadProducts();
renderOrders();
}

/* 🔐 LOGIN */
function login(){
let pass = document.getElementById("adminPass").value.trim();

if(pass === "admin@2026"){
localStorage.setItem("adminLogin","true");

document.getElementById("loginBox").style.display = "none";
document.getElementById("adminPanel").style.display = "block";

loadProducts();
renderOrders();

}else{
alert("Wrong Password ❌");
}
}

/* 🔥 LOAD PRODUCTS (IMPORTANT FIX) */
function loadProducts(){
products = JSON.parse(localStorage.getItem("products")) || [];
showProducts();
}

/* PRODUCTS */
let products = [];

/* SHOW PRODUCTS */
function showProducts(){

let list = document.getElementById("productList");
list.innerHTML = "";

if(products.length === 0){
list.innerHTML = "<p>No products 😢</p>";
return;
}

products.forEach((p,i)=>{

list.innerHTML += `
<div class="card" style="display:flex; gap:10px; align-items:center;">

<img src="${p.image}" style="width:60px; height:60px; border-radius:8px;">

<div style="flex:1;">
<p><b>${p.name}</b></p>
<p>₹${p.price}</p>
<p style="font-size:12px; color:gray;">${p.category || "No category"}</p>
</div>

<button class="edit-btn" onclick="editProduct(${i})">✏️</button>
<button class="delete-btn" onclick="deleteProduct(${i})">❌</button>

</div>
`;

});

}

/* ➕ ADD PRODUCT (FIXED) */
function addProduct(){

let name = document.getElementById("name").value.trim();
let price = document.getElementById("price").value.trim();
let image = document.getElementById("image").value.trim();
let category = document.getElementById("category").value;

if(!name || !price || !image){
alert("সব fill করো ⚠️");
return;
}

/* 🔥 always fresh data load */
let products = JSON.parse(localStorage.getItem("products")) || [];

products.push({
name:name,
price:Number(price),
image:image,
category:category
});

localStorage.setItem("products", JSON.stringify(products));

alert("Product Added ✅");

/* reload products */
loadProducts();

/* clear input */
document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("image").value = "";

}

/* ✏️ EDIT */
function editProduct(i){

let products = JSON.parse(localStorage.getItem("products")) || [];

let newName = prompt("Edit name", products[i].name);
let newPrice = prompt("Edit price", products[i].price);

if(newName && newPrice){
products[i].name = newName;
products[i].price = Number(newPrice);

localStorage.setItem("products", JSON.stringify(products));
loadProducts();
}

}

/* ❌ DELETE */
function deleteProduct(i){

let products = JSON.parse(localStorage.getItem("products")) || [];

if(confirm("Delete product?")){
products.splice(i,1);
localStorage.setItem("products", JSON.stringify(products));
loadProducts();
}

}

/* 🔥 ALL USER ORDERS LOAD */
function getAllOrders(){
let all = [];

for(let key in localStorage){
if(key.startsWith("orders_")){
let data = JSON.parse(localStorage.getItem(key)) || [];
all = all.concat(data);
}
}

return all;
}

let orders = getAllOrders();

/* 📦 SHOW ORDERS */
function renderOrders(){

orders = getAllOrders();

let container = document.getElementById("orderList");
container.innerHTML = "";

if(orders.length == 0){
container.innerHTML = "<p>No orders 😢</p>";
return;
}

orders.forEach((o,index)=>{

let itemsHTML = "";
let total = 0;

o.items.forEach(item=>{
itemsHTML += `<p>${item.name} (x${item.quantity})</p>`;
total += item.price * item.quantity;
});

let color = "orange";
if(o.status == "Shipped") color = "blue";
if(o.status == "Delivered") color = "green";

container.innerHTML += `
<div class="card">

<h4>🧾 ${o.id}</h4>

<p>Status: <b style="color:${color}">${o.status}</b></p>

<p><b>Name:</b> ${o.name}</p>
<p><b>Address:</b> ${o.address}</p>

<hr>

${itemsHTML}

<p><b>Total:</b> ₹${total}</p>

<select onchange="changeStatus(${index}, this.value)">
<option ${o.status=="Pending"?"selected":""}>Pending</option>
<option ${o.status=="Shipped"?"selected":""}>Shipped</option>
<option ${o.status=="Delivered"?"selected":""}>Delivered</option>
</select>

</div>
`;

});

}

/* 🔄 CHANGE STATUS */
function changeStatus(index, status){

orders[index].status = status;

/* save back */
let grouped = {};

orders.forEach(o=>{
let key = "orders_" + (o.name || "user");
if(!grouped[key]) grouped[key] = [];
grouped[key].push(o);
});

for(let k in grouped){
localStorage.setItem(k, JSON.stringify(grouped[k]));
}

renderOrders();

}

</script>

</body>
</html>
