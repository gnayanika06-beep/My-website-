<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>Your Cart</h1>
<a href="index.html">Home</a>
</header>

<main>

<div id="cart-items"></div>

<!-- Total (Sticky) -->
<h2 id="cart-total" class="cart-total">Total: ₹0</h2>

<br><br><br>

<input type="text" id="customerName" placeholder="Your Name">

<br><br>

<textarea id="customerAddress" placeholder="Your Delivery Address"></textarea>

<br><br>

<button onclick="orderOnWhatsApp()">Order on WhatsApp</button>

<button onclick="placeOrder()">Place Order</button>

</main>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* Remove Item */
function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

/* Quantity Change */
function changeQty(index, change){

cart[index].quantity += change;

if(cart[index].quantity <= 0){
cart.splice(index,1);
}

localStorage.setItem("cart", JSON.stringify(cart));
renderCart();

}

/* Show Cart */
function renderCart(){

let container = document.getElementById("cart-items");
let totalEl = document.getElementById("cart-total");

container.innerHTML = "";

let total = 0;

cart.forEach((item,i)=>{

total += item.price * item.quantity;

container.innerHTML += `
<div class="card" style="display:flex; gap:10px; align-items:center;">

<img src="${item.image}" style="width:80px; height:80px; border-radius:8px;">

<div style="flex:1;">
<p>${item.name}</p>
<p>₹${item.price}</p>

<div>
<button onclick="changeQty(${i}, -1)">−</button>
<span>${item.quantity}</span>
<button onclick="changeQty(${i}, 1)">+</button>
</div>
</div>

<button onclick="removeItem(${i})">❌</button>

</div>
`;

});

totalEl.textContent = "Total: ₹" + total;

}

/* WhatsApp Order */
function orderOnWhatsApp(){

if(cart.length == 0){
alert("Your cart is empty");
return;
}

let name = document.getElementById("customerName").value;
let address = document.getElementById("customerAddress").value;

if(name == "" || address == ""){
alert("Please enter your name and address");
return;
}

let phone = "919876543210"; // 👉 নিজের নম্বর বসাও

let message = "New Order%0A%0A";
message += "Name: " + name + "%0A";
message += "Address: " + address + "%0A%0A";

let total = 0;

cart.forEach((item,i)=>{
message += (i+1) + ". " + item.name + " x " + item.quantity + "%0A";
total += item.price * item.quantity;
});

message += "%0ATotal: ₹" + total;

let url = "https://wa.me/" + phone + "?text=" + message;
window.open(url);

}

/* Save Order */
function placeOrder(){

if(cart.length == 0){
alert("Cart is empty");
return;
}

let name = document.getElementById("customerName").value;
let address = document.getElementById("customerAddress").value;

if(name == "" || address == ""){
alert("Enter name & address");
return;
}

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let orderID = "ORD" + Math.floor(Math.random()*100000);

orders.push({
id: orderID,
items: cart,
name: name,
address: address,
status: "Pending"
});

localStorage.setItem("orders", JSON.stringify(orders));

alert("Order Placed! ID: " + orderID);

cart = [];
localStorage.removeItem("cart");

renderCart();

}

renderCart();

</script>

<!-- Bottom Navigation -->
<div class="bottom-nav">

<a href="index.html">🏠<br>Home</a>

<a href="#">📂<br>Categories</a>

<a href="cart.html">🛒<br>Cart</a>

<a href="orders.html">📦<br>Orders</a>

<a href="profile.html">👤<br>Profile</a>

</div>

</body>
</html>
