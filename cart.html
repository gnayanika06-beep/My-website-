<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 🔔 Toast -->
<div id="toast"></div>

<header class="header">
<h2>🛒 Your Cart</h2>
<a href="index.html" style="color:white;">⬅ Back</a>
</header>

<main style="padding:10px;">

<div id="cart-items"></div>

<h2 id="cart-total" class="cart-total">Total: ₹0</h2>

<br><br>

<input type="text" id="customerName" placeholder="Your Name">
<br><br>
<textarea id="customerAddress" placeholder="Your Delivery Address"></textarea>

<br><br>

<!-- ✅ COD BUTTON -->
<button onclick="placeCODOrder()">🛒 Place Order (Cash on Delivery)</button>

<button onclick="orderOnWhatsApp()">📲 WhatsApp Order</button>

</main>

<script>

/* 🔔 TOAST */
function showToast(message){
let toast = document.getElementById("toast");
toast.innerText = message;
toast.classList.add("show");
setTimeout(()=> toast.classList.remove("show"), 2000);
}

/* 🔐 USER CHECK */
let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
window.location.href = "login.html";
}

/* 🧠 USER KEYS */
let cartKey = "cart_" + currentUser;
let ordersKey = "orders_" + currentUser;

let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

/* ❌ REMOVE ITEM */
function removeItem(index){
cart.splice(index,1);
localStorage.setItem(cartKey,JSON.stringify(cart));
showToast("Item removed ❌");
renderCart();
}

/* ➕➖ QUANTITY */
function changeQty(index, change){

cart[index].quantity += change;

if(cart[index].quantity <= 0){
cart.splice(index,1);
showToast("Item removed ❌");
}else{
showToast("Updated ✔");
}

localStorage.setItem(cartKey, JSON.stringify(cart));
renderCart();
}

/* 🛒 RENDER CART */
function renderCart(){

let container = document.getElementById("cart-items");
let totalEl = document.getElementById("cart-total");

container.innerHTML = "";

if(cart.length === 0){
container.innerHTML = "<p style='text-align:center;'>🛒 Your cart is empty</p>";
totalEl.textContent = "Total: ₹0";
return;
}

let total = 0;

cart.forEach((item,i)=>{

let price = Number(item.price) || 0;
let qty = Number(item.quantity) || 0;

total += price * qty;

container.innerHTML += `
<div class="card" style="display:flex; gap:12px; align-items:center;">

<img src="${item.image}" style="width:90px; height:90px; border-radius:10px;">

<div style="flex:1;">
<p style="font-weight:bold;">${item.name}</p>
<p style="color:green;">₹${price}</p>

<div style="margin-top:5px;">
<button onclick="changeQty(${i}, -1)">➖</button>
<span style="margin:0 10px;">${qty}</span>
<button onclick="changeQty(${i}, 1)">➕</button>
</div>

</div>

<button onclick="removeItem(${i})" style="background:red;">❌</button>

</div>
`;

});

totalEl.textContent = "Total: ₹" + total;
}

/* 🛒 COD ORDER (FINAL PRO) */
function placeCODOrder(){

if(cart.length == 0){
showToast("Cart is empty ❌");
return;
}

let name = document.getElementById("customerName").value.trim();
let address = document.getElementById("customerAddress").value.trim();

if(name === "" || address === ""){
showToast("Enter name & address ⚠️");
return;
}

/* Total */
let total = 0;
cart.forEach(item => total += item.price * item.quantity);

/* Unique Order ID */
let orderID = "ORD" + Date.now();

/* Save Order */
let orders = JSON.parse(localStorage.getItem(ordersKey)) || [];

orders.push({
id: orderID,
items: cart,
name: name,
address: address,
total: total,
status: "Pending",
payment: "COD",
date: new Date().toLocaleString()
});

localStorage.setItem(ordersKey, JSON.stringify(orders));

/* Clear Cart */
localStorage.removeItem(cartKey);

/* Success */
window.location.href = "success.html?id=" + orderID;

}

/* 📲 WHATSAPP ORDER */
function orderOnWhatsApp(){

if(cart.length == 0){
showToast("Cart is empty ❌");
return;
}

let name = document.getElementById("customerName").value.trim();
let address = document.getElementById("customerAddress").value.trim();

if(name === "" || address === ""){
showToast("Enter name & address ⚠️");
return;
}

let phone = "91XXXXXXXXXX"; // 👉 নিজের নম্বর বসাও

let message = "New Order%0A%0A";
message += "Name: " + name + "%0A";
message += "Address: " + address + "%0A%0A";

let total = 0;

cart.forEach((item,i)=>{
message += (i+1) + ". " + item.name + " x " + item.quantity + "%0A";
total += item.price * item.quantity;
});

message += "%0ATotal: ₹" + total;

window.open("https://wa.me/" + phone + "?text=" + message);
}

/* LOAD */
renderCart();

</script>

<!-- Bottom Nav -->
<div class="bottom-nav">
<a href="index.html">🏠<br>Home</a>
<a href="wishlist.html">❤️<br>Wishlist</a>
<a href="cart.html">🛒<br>Cart</a>
<a href="orders.html">📦<br>Orders</a>
<a href="profile.html">👤<br>Profile</a>
</div>

</body>
</html>
