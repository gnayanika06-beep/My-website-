<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Your Cart</h1>
    <a href="index.html">Home</a>
</header>

<main>
    <div id="cart-items"></div>
    <h2 id="cart-total">Total: ₹0</h2>

    <!-- Customer Info -->
    <input type="text" id="customerName" placeholder="Your Name" required>
    <br><br>
    <textarea id="customerAddress" placeholder="Your Delivery Address" required></textarea>
    <br><br>

    <button onclick="orderOnWhatsApp()">Order on WhatsApp</button>
    <button onclick="placeOrder()">Place Order</button>
</main>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* Remove Item */
function removeItem(id) {
    cart = cart.filter(item => item.id !== id);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* Render Cart */
function renderCart() {
    const container = document.getElementById("cart-items");
    const totalEl = document.getElementById("cart-total");

    container.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
        total += item.price * item.quantity;

        const div = document.createElement("div");
        div.innerHTML = `
            <p>${item.name} - ₹${item.price} × ${item.quantity}</p>
            <button onclick="removeItem(${item.id})">Remove</button>
        `;
        container.appendChild(div);
    });

    totalEl.textContent = "Total: ₹" + total;
}

/* WhatsApp Order */
function orderOnWhatsApp() {

    if (cart.length === 0) {
        alert("Your cart is empty");
        return;
    }

    const name = document.getElementById("customerName").value;
    const address = document.getElementById("customerAddress").value;

    if (!name || !address) {
        alert("Please enter your name and address");
        return;
    }

    const phone = "91XXXXXXXXXX";  // 👉 এখানে নিজের WhatsApp নম্বর দাও
    const orderID = "ORD" + Math.floor(Math.random() * 100000);

    let message = "🛒 New Order\n\n";
    message += "🆔 Order ID: " + orderID + "\n";
    message += "👤 Name: " + name + "\n";
    message += "📍 Address: " + address + "\n\n";

    let total = 0;

    cart.forEach((item, index) => {
        message += (index + 1) + ". " + item.name + " x " + item.quantity + "\n";
        total += item.price * item.quantity;
    });

    message += "\n💰 Total: ₹" + total;

    const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");
}

/* Direct Order */
function placeOrder() {
    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    alert("Order placed successfully!");
    cart = [];
    localStorage.removeItem("cart");
    renderCart();
}

renderCart();

</script>

</body>
</html>
