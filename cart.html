<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>Your Cart</h1>
<a href="index.html">Home</a>
</header>

<main>

<div id="cart-items"></div>

<h2 id="cart-total">Total: ₹0</h2>

<br>

<input type="text" id="customerName" placeholder="Your Name">

<br><br>

<textarea id="customerAddress" placeholder="Your Delivery Address"></textarea>

<br><br>

<button onclick="orderOnWhatsApp()">Order on WhatsApp</button>

<button onclick="placeOrder()">Place Order</button>

</main>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

renderCart();

}

function renderCart(){

let container = document.getElementById("cart-items");
let totalEl = document.getElementById("cart-total");

container.innerHTML = "";

let total = 0;

cart.forEach((item,i)=>{

total += item.price * item.quantity;

container.innerHTML += `
<div>
<p>${item.name} - ₹${item.price} × ${item.quantity}</p>
<button onclick="removeItem(${i})">Remove</button>
</div>
`;

});

totalEl.textContent = "Total: ₹" + total;

}

function orderOnWhatsApp(){

if(cart.length == 0){
alert("Your cart is empty");
return;
}

let name = document.getElementById("customerName").value;

let address = document.getElementById("customerAddress").value;

if(name == "" || address == ""){
alert("Please enter your name and address");
return;
}

let phone = "919876543210";   // এখানে WhatsApp number বসাও

let message = "New Order%0A%0A";

message += "Name: " + name + "%0A";
message += "Address: " + address + "%0A%0A";

let total = 0;

cart.forEach((item,i)=>{

message += (i+1) + ". " + item.name + " x " + item.quantity + "%0A";

total += item.price * item.quantity;

});

message += "%0ATotal: ₹" + total;

let url = "https://wa.me/" + phone + "?text=" + message;

window.open(url);

}

function placeOrder(){

if(cart.length == 0){
alert("Cart is empty");
return;
}

alert("Order placed successfully!");

cart = [];

localStorage.removeItem("cart");

renderCart();

}

renderCart();

</script>
  
<div class="bottom-nav"><a href="index.html">🏠<br>Home</a>

<a href="#">📂<br>Categories</a>

<a href="cart.html">🛒<br>Cart</a>

<a href="#">📦<br>Orders</a>

<a href="profile.html">👤<br>Profile</a>

</div>
</body>
</html>
