<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shopping App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Header -->
<div class="header">
<div class="logo">MyShop</div>
<div class="icons">
<span>❤️</span>
<span>🛒</span>
</div>
</div>

<!-- Search -->
<div class="search">
<input type="text" placeholder="Search products">
</div>

<!-- Categories -->
<div class="categories">

<div class="cat">
<img src="https://via.placeholder.com/60">
<p>Fashion</p>
</div>

<div class="cat">
<img src="https://via.placeholder.com/60">
<p>Beauty</p>
</div>

<div class="cat">
<img src="https://via.placeholder.com/60">
<p>Kids</p>
</div>

<div class="cat">
<img src="https://via.placeholder.com/60">
<p>Kitchen</p>
</div>

</div>

<!-- Products -->
<div class="products">

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Stylish Dress</h4>
<p>₹299</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Hand Bag</h4>
<p>₹199</p>
<button>Buy Now</button>
</div>

</div>

<!-- Bottom Menu -->
<div class="bottom-nav">
<div>🏠 Home</div>
<div>📂 Categories</div>
<div>⭐ Mall</div>
<div>📦 Orders</div>
</div>

</body>
</html>
