<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>
<link rel="stylesheet" href="styles.css">

<!-- 🔥 PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d4d">

<style>
.header{
background:linear-gradient(45deg,#ff4d4d,#ff9966);
color:white;
padding:10px;
}

.card{
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:10px;
background:white;
transition:0.3s;
}
.card:hover{
transform:scale(1.03);
}

#installBtn{
position:fixed;
bottom:80px;
right:15px;
background:#ff4d4d;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
display:none;
z-index:999;
}
</style>

</head>

<body>

<!-- 🔔 Toast -->
<div id="toast"></div>

<!-- 📲 Install Button -->
<button id="installBtn">📲 Install App</button>

<!-- Header -->
<div class="header">
<h2>🛍 MyShop</h2>

<span id="userName" style="margin-left:10px;"></span>

<button onclick="logout()" style="float:right;">Logout</button>

<input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
</div>

<!-- Banner -->
<div class="banner">
<img src="https://images.unsplash.com/photo-1607083206968-13611e3d76db">
</div>

<!-- Categories -->
<div class="categories">
<div class="cat" onclick="selectCategory('All')"><p>All</p></div>
<div class="cat" onclick="selectCategory('Fashion')"><p>Fashion</p></div>
<div class="cat" onclick="selectCategory('Beauty')"><p>Beauty</p></div>
<div class="cat" onclick="selectCategory('Kids')"><p>Kids</p></div>
<div class="cat" onclick="selectCategory('Kitchen')"><p>Kitchen</p></div>
</div>

<!-- Products -->
<div class="products" id="productList"></div>

<!-- Bottom Nav -->
<div class="bottom-nav">
<a href="index.html">🏠<br>Home</a>
<a href="wishlist.html">❤️<br>Wishlist</a>
<a href="cart.html">🛒<br>Cart (<span id="cartCount">0</span>)</a>
<a href="orders.html">📦<br>Orders</a>
<a href="profile.html">👤<br>Profile</a>
</div>

<script>

/* 🔔 TOAST */
function showToast(message){
let toast = document.getElementById("toast");
toast.innerText = message;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2000);
}

/* 🔥 AUTO LOGIN MODE (NO LOGIN PROBLEM) */
let currentUser = localStorage.getItem("currentUser") || "guest";
localStorage.setItem("currentUser", currentUser);

/* 👤 PROFILE AUTO FIX */
let userName = localStorage.getItem("userName") || "Guest User";
let userAddress = localStorage.getItem("userAddress") || "Demo Address";

/* 👤 SHOW NAME */
document.getElementById("userName").innerText = "👋 " + userName;

/* USER KEYS */
let cartKey = "cart_" + currentUser;
let wishlistKey = "wishlist_" + currentUser;

/* DATA */
let products = JSON.parse(localStorage.getItem("products")) || [];
let selectedCategory = "All";

/* SHOW PRODUCTS */
function showProducts(list){

let container = document.getElementById("productList");
container.innerHTML = "";

if(list.length === 0){
container.innerHTML = "<p style='text-align:center;'>No products found 😢</p>";
return;
}

let ratings = JSON.parse(localStorage.getItem("ratings")) || {};

list.forEach(p => {

let div = document.createElement("div");
div.className = "card";

div.onclick = function(){
window.location.href = `product.html?name=${p.name}&price=${p.price}&image=${p.image}`;
};

let avg = ratings[p.name]?.avg || 0;
let discountPrice = Math.floor(p.price * 0.8);

let wishlist = JSON.parse(localStorage.getItem(wishlistKey)) || [];
let isWish = wishlist.find(item => item.name === p.name);

div.innerHTML = `
<div style="position:relative;">

<img src="${p.image}" style="border-radius:10px;">

<span onclick="event.stopPropagation(); toggleWishlist('${p.name}','${p.price}','${p.image}')" 
style="position:absolute; top:5px; right:10px; font-size:20px;">
${isWish ? "❤️" : "🤍"}
</span>

<span style="position:absolute; bottom:5px; left:5px; background:red; color:white; padding:2px 6px; font-size:12px;">
20% OFF
</span>

</div>

<h4>${p.name}</h4>

<p>
<span style="text-decoration:line-through; color:gray;">₹${p.price}</span>
<span style="color:green; font-weight:bold;"> ₹${discountPrice}</span>
</p>

<p style="color:orange;">
${"⭐".repeat(Math.round(avg))} (${avg.toFixed(1)})
</p>

<button onclick="event.stopPropagation(); addToCart('${p.name}', '${discountPrice}', '${p.image}')">
Add to Cart
</button>
`;

container.appendChild(div);

});
}

/* CATEGORY */
function selectCategory(cat){
selectedCategory = cat;
filterProducts();
}

/* FILTER */
function filterProducts(){

let searchValue = document.getElementById("searchInput").value.toLowerCase();

let filtered = products.filter(p => {
let matchSearch = p.name.toLowerCase().includes(searchValue);
let matchCategory = (selectedCategory === "All" || p.category === selectedCategory);
return matchSearch && matchCategory;
});

showProducts(filtered);
}

/* ADD TO CART */
function addToCart(name, price, image){

let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

let existing = cart.find(item => item.name === name);

if(existing){
existing.quantity += 1;
}else{
cart.push({name, price, image, quantity:1});
}

localStorage.setItem(cartKey, JSON.stringify(cart));

showToast("Added to cart 🛒");

updateCartCount();
}

/* ❤️ WISHLIST */
function toggleWishlist(name, price, image){

let wishlist = JSON.parse(localStorage.getItem(wishlistKey)) || [];

let existing = wishlist.find(item => item.name === name);

if(existing){
wishlist = wishlist.filter(item => item.name !== name);
showToast("Removed ❌");
}else{
wishlist.push({name, price, image});
showToast("Added ❤️");
}

localStorage.setItem(wishlistKey, JSON.stringify(wishlist));

filterProducts();
}

/* CART COUNT */
function updateCartCount(){

let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

let totalQty = 0;
cart.forEach(item => totalQty += item.quantity);

document.getElementById("cartCount").innerText = totalQty;
}

/* LOGOUT (FIXED) */
function logout(){
localStorage.removeItem("currentUser");
localStorage.removeItem("userName");
showToast("Logged out");
location.reload(); // login page এ যাবে না
}

/* LOAD */
showProducts(products);
updateCartCount();

</script>

</body>
</html>
