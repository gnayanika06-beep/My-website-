<!DOCTYPE html>
<html>

<body>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>
<link rel="stylesheet" href="styles.css">
</head>
<div class="header">
<h2>MyShop</h2>
<input type="text" placeholder="Search products...">
</div>

<!-- Banner -->
<div class="banner">
<img src="https://images.unsplash.com/photo-1607083206968-13611e3d76db">
</div>

<!-- Categories -->
<div class="categories">

<div class="cat">
<img src="https://cdn-icons-png.flaticon.com/128/892/892458.png">
<p>Fashion</p>
</div>

<div class="cat">
<img src="https://cdn-icons-png.flaticon.com/128/3075/3075977.png">
<p>Beauty</p>
</div>

<div class="cat">
<img src="https://cdn-icons-png.flaticon.com/128/3081/3081559.png">
<p>Kids</p>
</div>

<div class="cat">
<img src="https://cdn-icons-png.flaticon.com/128/1046/1046857.png">
<p>Kitchen</p>
</div>

</div>

<!-- Products -->
<div class="products" id="productList"></div>

<!-- Bottom Nav -->
<div class="bottom-nav">
<a href="index.html">🏠<br>Home</a>
<a href="#">📂<br>Categories</a>
<a href="cart.html">🛒<br>Cart (<span id="cartCount">0</span>)</a>
<a href="#">📦<br>Orders</a>
<a href="profile.html">👤<br>Profile</a>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let container = document.getElementById("productList");

container.innerHTML = "";

// Show Products
products.forEach(p => {

let div = document.createElement("div");

div.onclick = function(){
window.location.href = `product.html?name=${p.name}&price=${p.price}&image=${p.image}`;
};

div.className = "card";

div.innerHTML = `
<img src="${p.image}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="event.stopPropagation(); addToCart('${p.name}', '${p.price}', '${p.image}')">
Add to Cart
</button>
`;

container.appendChild(div);

});

// Add to Cart
function addToCart(name, price, image){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// check existing
let existing = cart.find(item => item.name === name);

if(existing){
existing.quantity += 1;
}else{
cart.push({
name, price, image, quantity:1
});
}

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added to cart");

updateCartCount();

}

// Cart Count
function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cartCount").innerText = cart.length;

}

// Run on load
updateCartCount();

</script>

</body>
</html>
